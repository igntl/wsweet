<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W sweet | متجر الشوكولاتة الفاخرة والضيافة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-gold: #d4af37; --dark-choco: #110702; --glass-bg: rgba(35, 17, 7, 0.75); --border-glow: rgba(212, 175, 55, 0.25); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--dark-choco); color: #f3e6dc; min-height: 100vh; }
        .main-wrapper { max-width: 900px; margin: 20px auto; padding: 20px; }
        .menu-card { background: var(--glass-bg); border: 1px solid var(--border-glow); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .card-price { color: var(--primary-gold); font-weight: 800; margin: 10px 0; }
        select { width: 100%; background: #2a1a0f; color: white; border: 1px solid var(--primary-gold); padding: 8px; border-radius: 6px; margin-bottom: 15px; }
        .qty-wrapper { display: flex; align-items: center; gap: 15px; }
        .qty-action { background: var(--primary-gold); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        #cartTray { position: fixed; bottom: 0; width: 100%; background: #231107; padding: 20px; border-top: 2px solid var(--primary-gold); display: none; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- بار بستاشيو -->
    <div class="menu-card" id="card-bar">
        <h3>بار بستاشيو الكنافة</h3>
        <div class="card-price" id="price-bar">15 ريال</div>
        <select id="select-bar" onchange="updatePrice('bar')">
            <option value="10">صغير - 10 ريال</option>
            <option value="15" selected>وسط - 15 ريال</option>
            <option value="20">كبير - 20 ريال</option>
        </select>
        <div class="qty-wrapper">
            <button class="qty-action" onclick="changeQty('bar', -1)">-</button>
            <span id="qty-bar">0</span>
            <button class="qty-action" onclick="changeQty('bar', 1)">+</button>
        </div>
    </div>

    <!-- لوقو دائري -->
    <div class="menu-card" id="card-logo">
        <h3>لوقو دائري</h3>
        <div class="card-price" id="price-logo">15 ريال</div>
        <select id="select-logo" onchange="updatePrice('logo')">
            <option value="10">صغير - 10 ريال</option>
            <option value="15" selected>وسط - 15 ريال</option>
            <option value="20">كبير - 20 ريال</option>
        </select>
        <div class="qty-wrapper">
            <button class="qty-action" onclick="changeQty('logo', -1)">-</button>
            <span id="qty-logo">0</span>
            <button class="qty-action" onclick="changeQty('logo', 1)">+</button>
        </div>
    </div>

    <!-- شرائط سكر -->
    <div class="menu-card" id="card-sugar">
        <h3>شرائط سكر</h3>
        <div class="card-price" id="price-sugar">15 ريال</div>
        <select id="select-sugar" onchange="updatePrice('sugar')">
            <option value="10">صغير - 10 ريال</option>
            <option value="15" selected>وسط - 15 ريال</option>
            <option value="20">كبير - 20 ريال</option>
        </select>
        <div class="qty-wrapper">
            <button class="qty-action" onclick="changeQty('sugar', -1)">-</button>
            <span id="qty-sugar">0</span>
            <button class="qty-action" onclick="changeQty('sugar', 1)">+</button>
        </div>
    </div>
</div>

<div id="cartTray">
    <strong>الإجمالي: <span id="total-val">0</span> ريال</strong>
    <button onclick="sendWhatsApp()" style="padding:10px 20px; border-radius:20px; border:none; background:#25D366; color:white;">إرسال الطلب</button>
</div>

<script>
    const products = {
        bar: { name: "بار بستاشيو", price: 15, qty: 0, size: "وسط" },
        logo: { name: "لوقو دائري", price: 15, qty: 0, size: "وسط" },
        sugar: { name: "شرائط سكر", price: 15, qty: 0, size: "وسط" }
    };

    function updatePrice(id) {
        const select = document.getElementById('select-' + id);
        products[id].price = parseInt(select.value);
        products[id].size = select.options[select.selectedIndex].text.split(' - ')[0];
        document.getElementById('price-' + id).innerText = select.value + " ريال";
        calc();
    }

    function changeQty(id, val) {
        products[id].qty = Math.max(0, products[id].qty + val);
        document.getElementById('qty-' + id).innerText = products[id].qty;
        calc();
    }

    function calc() {
        let total = 0, show = false;
        for(let k in products) {
            total += products[k].qty * products[k].price;
            if(products[k].qty > 0) show = true;
        }
        document.getElementById('total-val').innerText = total;
        document.getElementById('cartTray').style.display = show ? 'flex' : 'none';
    }

    function sendWhatsApp() {
        let msg = "طلب جديد من W sweet:\n";
        for(let k in products) {
            if(products[k].qty > 0) msg += `• ${products[k].name} (${products[k].size}) - الكمية: ${products[k].qty}\n`;
        }
        msg += "\nالإجمالي: " + document.getElementById('total-val').innerText + " ريال";
        window.open(`https://wa.me/966505691474?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
